<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROU7 - Every Memory Has A Soul</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
      font-family:'Poppins', sans-serif;
      background:#050505;
      color:#fff;
      scroll-behavior:smooth;
      overflow-x:hidden;
    }
    h1,h2,h3 {font-family:'Cinzel', serif;}
    a {color:inherit; text-decoration:none;}

    /* Loading Screen */
    #loader {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:#050505; display:flex; justify-content:center; align-items:center;
      z-index:2000; transition:opacity 1s ease;
    }
    #loader.hidden {opacity:0; visibility:hidden;}

    /* Navbar */
    header {
      position:fixed; top:0; left:0; width:100%;
      background:rgba(5,5,5,0.6); backdrop-filter:blur(10px);
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 50px; z-index:1000;
    }
    header nav a {
      margin:0 15px; font-weight:600; transition:color 0.3s;
    }
    header nav a:hover {color:#D4AF37;}
    .lang-switcher button {
      background:none; border:1px solid #D4AF37; color:#D4AF37;
      margin:0 5px; padding:5px 10px; cursor:pointer;
      transition:all 0.3s; border-radius:5px;
    }
    .lang-switcher button:hover {background:#D4AF37; color:#050505;}

    /* Hero Section */
    .hero {
      height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;
      text-align:center; position:relative; overflow:hidden;
    }
    .hero h1 {
      font-size:5rem; color:#D4AF37;
      text-shadow:0 0 20px #D4AF37,0 0 40px #D4AF37;
      animation:glow 3s infinite alternate;
    }
    .hero p {margin-top:10px; font-size:1.2rem;}
    .hero img {
      width:150px; margin-top:20px;
      animation:floating 4s ease-in-out infinite;
    }
    .hero .btn {
      margin-top:30px;
    }
    @keyframes glow {
      from {text-shadow:0 0 10px #D4AF37;}
      to {text-shadow:0 0 30px #D4AF37,0 0 60px #D4AF37;}
    }
    @keyframes floating {
      0%{transform:translateY(0);}
      50%{transform:translateY(-15px);}
      100%{transform:translateY(0);}
    }
    /* Floating particles */
    .particle {
      position:absolute; background:#D4AF37; border-radius:50%;
      opacity:0.6; animation:float 10s infinite;
    }
    @keyframes float {
      from {transform:translateY(0);}
      to {transform:translateY(-100vh);}
    }

    /* Sections */
    section {padding:100px 50px; text-align:center;}
    section h2 {font-size:2.5rem; color:#D4AF37; margin-bottom:30px;}

    /* Buttons */
    .btn {
      background:none; border:2px solid #D4AF37; color:#D4AF37;
      padding:10px 20px; cursor:pointer; transition:all 0.3s;
      border-radius:30px; text-transform:uppercase;
    }
    .btn:hover {
      background:#D4AF37; color:#050505; box-shadow:0 0 20px #D4AF37;
    }

    /* Products */
    .products {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:30px;
    }
    .product {
      background:rgba(255,255,255,0.05); border-radius:15px; overflow:hidden;
      box-shadow:0 0 15px rgba(212,175,55,0.3);
      transition:transform 0.3s, box-shadow 0.3s;
      padding-bottom:20px; position:relative;
    }
    .product:hover {
      transform:translateY(-10px);
      box-shadow:0 0 25px rgba(212,175,55,0.6);
    }
    .product img {width:100%; height:250px; object-fit:cover;}
    .product h3 {margin:15px 0;}
    .product p {padding:0 15px; font-size:0.9rem;}
    .price {color:#D4AF37; font-weight:bold; margin:10px 0;}
    .wishlist {
      position:absolute; top:10px; right:10px; cursor:pointer;
      font-size:1.5rem; color:#fff; transition:color 0.3s;
    }
    .wishlist:hover {color:#D4AF37;}

    /* Gallery */
    .gallery {column-count:3; column-gap:15px;}
    .gallery img {
      width:100%; margin-bottom:15px; border-radius:10px;
      cursor:pointer; transition:transform 0.3s;
    }
    .gallery img:hover {transform:scale(1.05);}
    #modal {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center;
      visibility:hidden; opacity:0; transition:opacity 0.5s;
    }
    #modal img {max-width:90%; max-height:90%; border:5px solid #D4AF37; border-radius:10px;}
    #modal.visible {visibility:visible; opacity:1;}

    /* Reviews */
    .reviews {display:flex; flex-wrap:wrap; gap:20px; justify-content:center;}
    .review {
      background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;
      width:300px; box-shadow:0 0 15px rgba(212,175,55,0.3);
    }
    .stars {color:#D4AF37; margin-bottom:10px;}

    /* Statistics */
    .stats {display:flex; flex-wrap:wrap; gap:30px; justify-content:center;}
    .stat {text-align:center;}
    .stat h3 {font-size:2rem; color:#D4AF37;}

    /* Contact */
    .contact form {max-width:600px; margin:auto; display:flex; flex-direction:column; gap:15px;}
    .contact input, .contact textarea {
      padding:10px; border:none; border-radius:5px;
    }

    /* Social Links */
    .social a {margin:0 10px; font-size:1.5rem; color:#fff; transition:color 0.3s;}
    .social a:hover {color:#D4AF37;}

    /* Footer */
    footer {
      background:#000; padding:30px; text-align:center;
      border-top:1px solid #333; color:#aaa;
    }

    /* Fade-in */
    .fade-in {opacity:0; transform:translateY(20px); transition:all 1s;}
    .fade-in.visible {opacity:1; transform:translateY(0);}
    @media(max-width:768px){
      header {padding:10px 20px;}
      .hero h1 {font-size:3rem;}
      .gallery {column-count:1;}
    }
  </style>
</head>
<body>
  <!-- Loader -->
  <div id="loader"><h1 style="color:#D4AF37;">ROU7</h1></div>

  <!-- Navbar -->
  <header>
    <div class="logo"><img src="logo.png" alt="ROU7 Logo" style="height:50px;"></div>
    <nav>
      <a href="#hero" data-key="nav_home">Home</a>
      <a href="#about" data-key="nav_about">About</a>
      <a href="#products" data-key="nav_products">Products</a>
      <a href="#gallery" data-key="nav_gallery">Gallery</a>
      <a href="#reviews" data-key="nav_reviews">Reviews</a>
      <a href="#contact" data-key="nav_contact">Contact</a>
    </nav>
    <div class="lang-switcher">
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('fr')">
